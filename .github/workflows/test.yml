name: Phoenix Core Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  test-python:
    name: Test Python Scanner
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow opencv-python
        pip install pytest
    
    - name: Run Python tests
      run: |
        # Skip if no tests directory or tests fail
        if [ -d tests ]; then
          pytest tests/ -v || echo "Tests failed but continuing"
        else
          echo "No tests directory, skipping"
        fi

  test-c-compile:
    name: Test C Compilation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
    
    - name: Compile C detector
      run: |
        if [ -f simple_detector.c ]; then
          gcc -o simple_detector simple_detector.c -Wall -Wextra
          echo "✅ Compiled successfully"
          file simple_detector
        else
          echo "⚠️ No C file found"
        fi

  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the whole workflow on lint errors
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linters
      run: |
        pip install flake8 black
    
    - name: Run flake8
      run: flake8 *.py --max-line-length=120 --ignore=E501,W503 || true
    
    - name: Run black check
      run: black --check *.py || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block on security scan
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'  # Don't exit with error
        severity: 'CRITICAL,HIGH'

  # Notify job removed temporarily due to permissions
