name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow
    
    - name: Check Python syntax
      run: |
        python -m py_compile fast_scanner.py
        python -m py_compile simple_auto.py
        python -m py_compile python_scanner.py
    
    - name: Build C detector
      run: |
        gcc -Wall -Wextra simple_detector.c -o simple_detector || true
    
    - name: Check shell scripts
      run: |
        # Check shell syntax
        bash -n install.sh
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 fast_scanner.py simple_auto.py python_scanner.py --max-line-length=100 || true

  kernel-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install build essentials
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic
    
    - name: Check kernel module syntax
      run: |
        cd kernel && make clean || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
