name: Bug Report
description: Report a bug or issue with Phoenix Core
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - Android (Termux)
        - Linux
        - Windows (WSL)
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "Python 3.11.2"

  - type: input
    id: termux_environment
    attributes:
      label: Termux/Environment Details
      description: Device model, Android version (if applicable)
      placeholder: "Pixel 6, Android 13"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe the bug or issue
      placeholder: "When I run fast_scanner.py, it crashes with..."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue
      placeholder: |
        1. Run `python fast_scanner.py`
        2. Wait for 5 seconds
        3. App crashes
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The scanner should continue running..."
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Error Message / Log Output
      description: Full error message or log output
      render: shell
      placeholder: |
        Traceback (most recent call last):
          File "fast_scanner.py", line 50, in <module>
            ...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other relevant information?
      placeholder: "Works fine on Python 3.10 but fails on 3.13"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues
          required: true
        - label: I've provided all relevant information
          required: true
        - label: I can reproduce the issue consistently
