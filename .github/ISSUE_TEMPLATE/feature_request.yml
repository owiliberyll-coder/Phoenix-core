name: ✨ Feature Request
description: Suggest a new feature
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve Phoenix Core with your idea!

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Kernel Module
        - Detection Algorithm
        - User Interface
        - Security/Privacy
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "It's difficult to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Any technical ideas on how to implement this?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (Must have)
        - High (Important)
        - Medium (Nice to have)
        - Low (Future)
