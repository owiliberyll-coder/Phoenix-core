name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Please describe your feature request below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
      placeholder: "I would like Phoenix Core to support real-time video streams instead of just photos..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature important? What problem does it solve?
      placeholder: |
        Currently, users have to manually run the scanner.
        With this feature, continuous monitoring would...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?
      placeholder: "Alternative 1: Use cron jobs
Alternative 2: Daemon process"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Feature aligns with Phoenix Core mission
        - label: I've checked similar existing features
